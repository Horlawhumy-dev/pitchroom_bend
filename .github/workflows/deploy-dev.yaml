name: Build and Push Docker Image To ECR

on:
  push:
    branches:
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 058264132818.dkr.ecr.us-east-1.amazonaws.com

          docker build -t 058264132818.dkr.ecr.us-east-1.amazonaws.com/dev-ms-interview-help-service:${GITHUB_SHA} .
          docker push 058264132818.dkr.ecr.us-east-1.amazonaws.com/dev-ms-interview-help-service:${GITHUB_SHA}
