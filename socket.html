<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab Sharing and Audio Buffer Processing</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
      }
      video {
        width: 100%;
        max-width: 600px;
        margin-bottom: 20px;
        background: black;
      }
      button {
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      button:disabled {
        background-color: #6c757d;
      }
    </style>
  </head>
  <body>
    <h1>Tab Sharing and Microphone Capture</h1>

    <video id="video" muted autoplay></video>
    <button id="shareButton">Start listening</button>

    <script>
      let isSpacePressed = false;
      let videoElement = document.getElementById("video");
      let websocket;
      initWebSocket();
      let recordContext, recordWorkletNode, mediaStreamSource;

      document.addEventListener("keydown", (event) => {
        if (event.code === "Space") {
          isSpacePressed = true;
        }
      });

      document.addEventListener("keyup", (event) => {
        if (event.code === "Space") {
          isSpacePressed = false;
        }
      });

      document
        .getElementById("shareButton")
        .addEventListener("click", async () => {
          startInterview();
        });

      async function startInterview() {
        try {
          const userStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
            },
          });

          recordContext = new (window.AudioContext ||
            window.webkitAudioContext)();
          await recordContext.audioWorklet.addModule("recording-processor.js");
          recordWorkletNode = new AudioWorkletNode(
            recordContext,
            "recording-processor",
          );

          // Inside the recordWorkletNode.onmessage handler
          recordWorkletNode.port.onmessage = (event) => {
            if (isSpacePressed) {
              const inputData = event.data;

              // Downsample the input data
              const downsampledData = downsampleBuffer(
                inputData,
                recordContext.sampleRate,
                24000,
              );

              // Convert the downsampled data to Int16 format
              const pcm16Data = convertFloat32ToInt16(downsampledData);

              // Log the data to make sure it's correct
              console.log("Sending data to WebSocket:", pcm16Data);

              // Send the ArrayBuffer directly
              if (websocket && websocket.readyState === WebSocket.OPEN) {
                websocket.send(
                  JSON.stringify({
                    action_type: "transcribe",
                    audio: pcm16Data,
                  }),
                );
              }
            }
          };

          mediaStreamSource = recordContext.createMediaStreamSource(userStream);
          mediaStreamSource.connect(recordWorkletNode);
          recordWorkletNode.connect(recordContext.destination);
        } catch (err) {
          console.error("Error starting interview recording:", err);
        }
      }

      function initWebSocket() {
        console.log("Initializing WebSocket");
        websocket = new WebSocket(
          "ws://localhost:3000?sessionId=7b96db8c-5b58-485f-b798-cdbf480cff4b",
        );
        websocket.binaryType = "arraybuffer";
        websocket.onopen = () =>
          console.log("WebSocket connection established.");
        websocket.onmessage = (event) => {
          console.log("WebSocket message:", event.data);
          const response = JSON.parse(event.data); // Assuming the server sends a JSON response
          if (response.transcript) {
            // Display the transcribed text in the page
            const transcriptElement = document.createElement("p");
            transcriptElement.textContent = response.transcript;
            document.body.appendChild(transcriptElement);
          }
        };

        websocket.onerror = (error) => console.error("WebSocket error:", error);
        websocket.onclose = () => console.log("WebSocket connection closed.");
      }

      // Function to downsample a buffer from one sample rate to another
      function downsampleBuffer(buffer, inputSampleRate, outputSampleRate) {
        if (outputSampleRate === inputSampleRate) {
          return buffer;
        }
        if (outputSampleRate > inputSampleRate) {
          throw new Error(
            "Downsampling rate should be smaller than the original sample rate",
          );
        }

        const sampleRateRatio = inputSampleRate / outputSampleRate;
        const newLength = Math.round(buffer.length / sampleRateRatio);
        const result = new Float32Array(newLength);
        let offsetResult = 0;
        let offsetBuffer = 0;

        while (offsetResult < result.length) {
          const nextOffsetBuffer = Math.round(
            (offsetResult + 1) * sampleRateRatio,
          );
          let accum = 0;
          let count = 0;

          for (
            let i = offsetBuffer;
            i < nextOffsetBuffer && i < buffer.length;
            i++
          ) {
            accum += buffer[i];
            count++;
          }
          result[offsetResult] = accum / count;
          offsetResult++;
          offsetBuffer = nextOffsetBuffer;
        }
        return result;
      }

      // Function to convert a Float32Array buffer to an Int16Array and return its ArrayBuffer
      function convertFloat32ToInt16(buffer) {
        const length = buffer.length;
        const int16Buffer = new Int16Array(length);

        for (let i = 0; i < length; i++) {
          const sample = Math.max(-1, Math.min(1, buffer[i]));
          int16Buffer[i] = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
        }

        return int16Buffer;
      }
    </script>
  </body>
</html>
